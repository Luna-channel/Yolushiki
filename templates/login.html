<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜鹭机 - 登录</title>
    <link rel="icon" href="/static/logo.ico" type="image/x-icon">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        :root, [data-theme="dark"] {
            --bg-primary: #0a1628;
            --bg-secondary: #111d32;
            --bg-card: rgba(20,40,80,0.5);
            --accent-blue: #2d5a8e;
            --accent-blue-light: #4a8ecf;
            --accent-red: #c0392b;
            --accent-yellow: #d4a017;
            --accent-green: #27ae60;
            --text-primary: #e0e6f0;
            --text-secondary: #7a8ba5;
            --border: rgba(45,90,142,0.3);
            --input-bg: rgba(0,0,0,0.3);
        }
        [data-theme="light"] {
            --bg-primary: #eef2f7;
            --bg-secondary: #dde4ed;
            --bg-card: rgba(255,255,255,0.85);
            --accent-blue: #2d5a8e;
            --accent-blue-light: #3a7bd5;
            --accent-red: #c0392b;
            --accent-yellow: #b8860b;
            --accent-green: #27ae60;
            --text-primary: #1a2332;
            --text-secondary: #5a6a7e;
            --border: rgba(45,90,142,0.2);
            --input-bg: rgba(255,255,255,0.8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-primary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header .logo-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            border-radius: 12px;
        }
        .login-header h1 {
            font-size: 2rem;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .login-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            backdrop-filter: blur(10px);
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }
        .input-group label i { width: 16px; height: 16px; }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--accent-blue-light);
        }
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-blue-light) 100%);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(45,90,142,0.4);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .error-msg {
            background: rgba(192,57,43,0.15);
            border: 1px solid rgba(192,57,43,0.3);
            color: var(--accent-red);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.show { display: block; }
        .hint {
            text-align: center;
            margin-top: 24px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .hint code {
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.78rem;
            color: var(--accent-yellow);
        }

        /* Token 首次设置弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.hidden { display: none; }
        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            max-width: 420px;
            width: 100%;
        }
        .modal h2 {
            color: var(--text-primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
        }
        .modal h2 i { color: var(--accent-yellow); }
        .modal .desc {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .success-msg {
            background: rgba(39,174,96,0.15);
            border: 1px solid rgba(39,174,96,0.3);
            color: var(--accent-green);
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
            line-height: 1.5;
        }
        .success-msg.show { display: block; }

        /* 公告弹窗 */
        .announcement-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .announcement-box {
            background: var(--bg-secondary);
            border: 2px solid var(--accent-blue);
            border-radius: 16px;
            padding: 28px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            max-height: 85vh;
            overflow-y: auto;
        }
        .announcement-box .title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-yellow);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .announcement-box .content {
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.8;
            margin-bottom: 20px;
            text-align: left;
        }
        .announcement-box .content p {
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 3px solid var(--accent-blue);
        }
        .announcement-box .content p:last-child { margin-bottom: 0; }
        .announcement-box .countdown {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
        .announcement-box .close-btn {
            padding: 10px 28px;
            background: var(--accent-blue);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .announcement-box .close-btn:disabled {
            background: #444;
            cursor: not-allowed;
        }
        .announcement-box .close-btn:not(:disabled):hover {
            background: var(--accent-blue-light);
        }
        /* 公告列表 */
        .announcement-list {
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }
        .announcement-list .list-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-align: left;
        }
        .announcement-item {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
        }
        .announcement-item-header {
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.2s;
        }
        .announcement-item-header:hover {
            background: rgba(45,90,142,0.15);
        }
        .announcement-item-header .item-title {
            font-size: 0.9rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .announcement-item-header .item-title .pin {
            color: var(--accent-yellow);
            font-size: 0.75rem;
        }
        .announcement-item-header .arrow {
            color: var(--text-secondary);
            transition: transform 0.2s;
        }
        .announcement-item.expanded .arrow {
            transform: rotate(180deg);
        }
        .announcement-item-content {
            display: none;
            padding: 0 14px 14px;
            font-size: 0.85rem;
            line-height: 1.7;
            color: var(--text-secondary);
            text-align: left;
        }
        .announcement-item.expanded .announcement-item-content {
            display: block;
        }
    </style>
</head>
<body>
    <!-- 首次设置 Token 弹窗 -->
    <div class="modal-overlay hidden" id="setup-modal">
        <div class="modal">
            <h2><i data-lucide="shield-check"></i> 设置访问令牌</h2>
            <p class="desc">
                首次使用夜鹭机，请设置一个访问令牌 (Token)。<br>
                此令牌将用于登录管理面板，请牢记。
            </p>
            <div class="error-msg" id="setup-error"></div>
            <div class="success-msg" id="setup-success"></div>
            <div class="input-group">
                <label><i data-lucide="key"></i> 设置 Token</label>
                <input type="password" id="setup-token" placeholder="输入你的访问令牌">
            </div>
            <div class="input-group">
                <label><i data-lucide="check-circle"></i> 确认 Token</label>
                <input type="password" id="setup-token-confirm" placeholder="再次输入确认">
            </div>
            <button class="btn btn-primary" onclick="setupToken()">
                <i data-lucide="lock"></i> 确认设置
            </button>
            <div class="hint" style="margin-top:16px;">
                Token 将明文保存至 <code>/opt/yolushiki/config.json</code>
            </div>
        </div>
    </div>

    <!-- 公告弹窗 -->
    <div class="announcement-overlay" id="announcement-overlay" style="display:none;">
        <div class="announcement-box">
            <div class="title">📢 重要公告</div>
            <div class="content" id="announcement-content"></div>
            <div class="countdown" id="announcement-countdown"></div>
            <button class="close-btn" id="announcement-close-btn" onclick="closeAnnouncement()" disabled>请阅读 (5s)</button>
            
            <!-- 公告列表 -->
            <div class="announcement-list" id="announcement-list"></div>
        </div>
    </div>

    <!-- 登录表单 -->
    <div class="login-container" id="login-section">
        <div class="login-header">
            <img src="/static/logo.png" alt="夜鹭机" class="logo-icon">
            <h1>夜鹭机</h1>
            <p>AstrBot + SillyTavern 管理面板</p>
        </div>
        <div class="login-card">
            <div class="error-msg" id="login-error"></div>
            <div class="input-group">
                <label><i data-lucide="key"></i> 访问令牌</label>
                <input type="password" id="login-token" placeholder="输入 Token 登录"
                       onkeydown="if(event.key==='Enter')doLogin()">
            </div>
            <button class="btn btn-primary" id="login-btn" onclick="doLogin()">
                <i data-lucide="log-in"></i> 登 录
            </button>
        </div>
        <div class="hint">
            忘记 Token？请 SSH 登录服务器查看<br>
            <code>cat /opt/yolushiki/config.json</code>
        </div>
    </div>

    <script>
        // 恢复主题
        (function() {
            var saved = localStorage.getItem('yolushiki-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();
        // 初始化 Lucide 图标
        lucide.createIcons();

        // 页面加载时检查状态
        (async function init() {
            try {
                const res = await fetch('/api/auth/check');
                const data = await res.json();
                if (!data.token_set) {
                    // 首次使用，弹出设置弹窗
                    document.getElementById('setup-modal').classList.remove('hidden');
                    document.getElementById('login-section').style.display = 'none';
                } else if (data.authenticated) {
                    // 已登录，跳转主页
                    window.location.href = '/';
                } else {
                    // 检查是否需要显示公告（从重置Token跳转过来）
                    const urlParams = new URLSearchParams(window.location.search);
                    if (urlParams.get('show_announcement') === '1') {
                        // 清除URL参数
                        window.history.replaceState({}, '', '/login');
                        // 显示公告
                        showAnnouncement(null);
                    }
                }
            } catch(e) {
                console.error('检查状态失败', e);
            }
        })();

        // ===== 公告系统 =====
        const ANNOUNCEMENTS = [
            {
                id: 1,
                title: '免费分享声明',
                pinned: true,
                content: [
                    '夜鹭机为免费分享，作者：Luna_Dol 内容为开源，禁止倒卖。',
                    '如果你在任何渠道购买了夜鹭机，凭借退款+举报截图联系小红书 @柯尔速递 领取免费1对1技术支持。',
                    '本内容可二传、二改，但禁止除作者本人外上传至DC中文酒馆社区。'
                ]
            }
            // 可以在这里添加更多公告
            // { id: 2, title: '新功能上线', pinned: false, content: ['内容...'] }
        ];

        let announcementTimer = null;
        let announcementCallback = null;

        function showAnnouncement(callback) {
            announcementCallback = callback;
            const mainAnnouncement = ANNOUNCEMENTS.find(a => a.pinned) || ANNOUNCEMENTS[0];
            
            // 显示主公告内容（分段）
            const contentEl = document.getElementById('announcement-content');
            contentEl.innerHTML = mainAnnouncement.content.map(p => `<p>${p}</p>`).join('');
            
            // 生成公告列表
            const listEl = document.getElementById('announcement-list');
            if (ANNOUNCEMENTS.length > 0) {
                listEl.innerHTML = `
                    <div class="list-title">全部公告 (${ANNOUNCEMENTS.length})</div>
                    ${ANNOUNCEMENTS.map(a => `
                        <div class="announcement-item" id="ann-item-${a.id}">
                            <div class="announcement-item-header" onclick="toggleAnnouncementItem(${a.id})">
                                <span class="item-title">
                                    ${a.pinned ? '<span class="pin">📌 置顶</span>' : ''}
                                    ${a.title}
                                </span>
                                <span class="arrow">▼</span>
                            </div>
                            <div class="announcement-item-content">
                                ${a.content.map(p => `<p>${p}</p>`).join('')}
                            </div>
                        </div>
                    `).join('')}
                `;
            } else {
                listEl.innerHTML = '';
            }
            
            document.getElementById('announcement-overlay').style.display = 'flex';
            const btn = document.getElementById('announcement-close-btn');
            const countdownEl = document.getElementById('announcement-countdown');
            
            btn.disabled = true;
            let countdown = 5;
            btn.textContent = `请阅读 (${countdown}s)`;
            countdownEl.textContent = `请仔细阅读以上内容，${countdown}秒后可关闭`;
            announcementTimer = setInterval(() => {
                countdown--;
                if (countdown > 0) {
                    btn.textContent = `请阅读 (${countdown}s)`;
                    countdownEl.textContent = `请仔细阅读以上内容，${countdown}秒后可关闭`;
                } else {
                    clearInterval(announcementTimer);
                    btn.disabled = false;
                    btn.textContent = '我已阅读';
                    countdownEl.textContent = '';
                }
            }, 1000);
        }

        function toggleAnnouncementItem(id) {
            const item = document.getElementById('ann-item-' + id);
            if (item) item.classList.toggle('expanded');
        }

        function closeAnnouncement() {
            document.getElementById('announcement-overlay').style.display = 'none';
            if (announcementTimer) {
                clearInterval(announcementTimer);
                announcementTimer = null;
            }
            if (announcementCallback) {
                announcementCallback();
                announcementCallback = null;
            }
        }

        async function setupToken() {
            const token = document.getElementById('setup-token').value.trim();
            const tokenConfirm = document.getElementById('setup-token-confirm').value.trim();
            const errEl = document.getElementById('setup-error');
            const successEl = document.getElementById('setup-success');

            errEl.classList.remove('show');
            successEl.classList.remove('show');

            if (!token) {
                errEl.textContent = 'Token 不能为空';
                errEl.classList.add('show');
                return;
            }
            if (token !== tokenConfirm) {
                errEl.textContent = '两次输入不一致';
                errEl.classList.add('show');
                return;
            }

            try {
                const res = await fetch('/api/auth/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, token_confirm: tokenConfirm })
                });
                const data = await res.json();
                if (data.success) {
                    successEl.textContent = data.message;
                    successEl.classList.add('show');
                    // 显示公告弹窗，5秒后跳转
                    showAnnouncement(() => {
                        window.location.href = '/';
                    });
                } else {
                    errEl.textContent = data.error || '设置失败';
                    errEl.classList.add('show');
                }
            } catch(e) {
                errEl.textContent = '网络错误';
                errEl.classList.add('show');
            }
        }

        async function doLogin() {
            const token = document.getElementById('login-token').value.trim();
            const errEl = document.getElementById('login-error');
            errEl.classList.remove('show');

            if (!token) {
                errEl.textContent = '请输入 Token';
                errEl.classList.add('show');
                return;
            }

            const btn = document.getElementById('login-btn');
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    errEl.textContent = data.error || '登录失败';
                    errEl.classList.add('show');
                    btn.disabled = false;
                }
            } catch(e) {
                errEl.textContent = '网络错误';
                errEl.classList.add('show');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
